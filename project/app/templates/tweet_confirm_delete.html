{% extends "layout.html" %}

{% block title %}
   Delete Tweet
{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
    
    <div class="card shadow-lg p-4 text-center" style="width: 400px; border-radius: 15px;">
        
        <h3 class="mb-3 text-danger fw-bold">
            ⚠ Delete Tweet
        </h3>

        <p class="text-muted mb-4">
            Are you sure you want to delete this tweet? <br>
            This action cannot be undone.
        </p>

        <form method="post">
            {% csrf_token %}
            
            <div class="d-flex justify-content-between">
                <button class="btn btn-danger px-4">
                    Delete
                </button>

                <a href="{% url 'tweet_list' %}" class="btn btn-outline-secondary px-4">
                    Cancel
                </a>
            </div>
        </form>

    </div>

</div>

{% endblock %}

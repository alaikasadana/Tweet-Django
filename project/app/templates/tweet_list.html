{% extends "layout.html" %}

{% block title %}
Home
{% endblock %}

{% block content %}

<style>
/* ===== Layout ===== */
.tweet-container {
  padding: 20px;
}

/* Header */
.tweet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.tweet-title {
  font-size: 26px;
  font-weight: bold;
}

/* Button */
.create-btn {
  background: #3b82f6;
  color: white;
  padding: 8px 18px;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.create-btn:hover {
  background: #2563eb;
}

/* Grid */
.tweet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Card */
.tweet-card {
  background: #1f2937;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #374151;
  transition: all 0.3s ease;
}

.tweet-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.4);
}

/* Image */
.tweet-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* Body */
.tweet-body {
  padding: 15px;
}

.tweet-user {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 6px;
}

.tweet-text {
  font-size: 15px;
  color: #e5e7eb;
  line-height: 1.5;
}

/* Buttons */
.tweet-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.btn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 13px;
  text-decoration: none;
  transition: 0.3s;
}

.btn-edit {
  border: 1px solid #3b82f6;
  color: #3b82f6;
}

.btn-edit:hover {
  background: #3b82f6;
  color: white;
}

.btn-delete {
  border: 1px solid #ef4444;
  color: #ef4444;
}

.btn-delete:hover {
  background: #ef4444;
  color: white;
}
</style>

<div class="tweet-container">

  <!-- Header -->
  <div class="tweet-header">
    <div class="tweet-title">Tweet Feed</div>
    <a href="{% url 'tweet_create' %}" class="create-btn">
      + Create Tweet
    </a>
  </div>

  <!-- Grid -->
  <div class="tweet-grid">

    {% for tweet in tweets %}

    <div class="tweet-card">

      {% if tweet.photo %}
      <img src="{{ tweet.photo.url }}" class="tweet-img">
      {% endif %}

      <div class="tweet-body">

        <div class="tweet-user">
          @{{ tweet.user.username }}
        </div>
     
        <div class="tweet-text">
          {{ tweet.text }}
        </div>
       {% if tweet.user == user %}
        <div class="tweet-actions">
          <a href="{% url 'tweet_edit' tweet.id %}" class="btn btn-edit">
            Edit
          </a>
          <a href="{% url 'tweet_delete' tweet.id %}" class="btn btn-delete">
            Delete
          </a>
        </div>

        {% endif  %}

      </div>
    </div>

    {% endfor %}

  </div>
</div>

{% endblock %}

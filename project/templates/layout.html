{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}Tweets{% endblock %}
    </title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100">

    <!-- 🔥 Navbar -->
    <nav class="bg-gray-800 shadow-md border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">

                <!-- Left: Brand + Links -->
                <div class="flex items-center space-x-6">
                    
                    <!-- Brand -->
                    <h1 class="text-xl font-bold text-blue-400">Tweets</h1>

                    <!-- Nav Links -->
                    <a href="#" class="text-gray-300 hover:text-white font-medium transition">Home</a>
                    <a href="#" class="text-gray-300 hover:text-white font-medium transition">Posts</a>
                    <a href="#" class="text-gray-300 hover:text-white font-medium transition">Account</a>
                </div>

                <!-- Right: Search -->
                <div class="flex items-center space-x-2">
                    <input 
                        type="text" 
                        placeholder="Search..."
                        class="px-3 py-1 bg-gray-700 border border-gray-600 rounded-md text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <button 
                        class="px-3 py-1 bg-blue-500 text-white text-sm rounded-md hover:bg-blue-600 transition"
                    >
                        Search
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <!-- 🔽 Page Content -->
    <main class="max-w-7xl mx-auto p-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>

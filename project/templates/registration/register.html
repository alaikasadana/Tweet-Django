{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-blue-400 mb-6">
            Create Account
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm mb-1">Username</label>
                <input type="text" name="username"
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter username"
                    required>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" name="password1"
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter password"
                    required>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm mb-1">Confirm Password</label>
                <input type="password" name="password2"
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Confirm password"
                    required>
            </div>

            <!-- Show Errors -->
            {% if form.errors %}
                <div class="bg-red-500/20 text-red-400 p-2 rounded-md text-sm">
                    {{ form.errors }}
                </div>
            {% endif %}

            <!-- Submit -->
            <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 transition py-2 rounded-md font-semibold">
                Register
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-4">
            Already have an account?
            <a href="{% url 'login' %}" class="text-blue-400 hover:underline">
                Login
            </a>
        </p>

    </div>
</div>

{% endblock %}
